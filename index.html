<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manajemen Mesin Produksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #0ea5e9 100%);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .step-card {
            position: relative;
            overflow: hidden;
        }
        .step-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #3b82f6, #0ea5e9);
            border-radius: 4px 0 0 4px;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        .animate-slide-up {
            animation: slideUp 0.4s ease-out;
        }
        .animate-scale-in {
            animation: scaleIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .sidebar-item {
            position: relative;
            transition: all 0.2s;
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
            color: #2563eb;
            border-right: 3px solid #2563eb;
        }
        .sidebar-item:hover:not(.active) {
            background: rgba(243, 244, 246, 0.8);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .image-upload-zone {
            border: 2px dashed #d1d5db;
            transition: all 0.2s;
            cursor: pointer;
        }
        .image-upload-zone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.03);
        }
        
        .repair-card-pending {
            border-left: 4px solid #f59e0b;
        }
        .repair-card-done {
            border-left: 4px solid #10b981;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .machine-icon {
            font-size: 2rem;
            filter: grayscale(0.3);
            transition: all 0.3s;
        }
        .card-hover:hover .machine-icon {
            filter: grayscale(0);
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300">
            <!-- Logo -->
            <div class="p-6 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <i class="fas fa-industry text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg tracking-tight">Engineering</h1>
                        <p class="text-xs text-gray-400 font-medium">Manajemen Mesin</p>
                    </div>
                </div>
            </div>

            <!-- Nav -->
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider px-4 py-2">Menu Utama</div>
                
                <button onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium">
                    <i class="fas fa-chart-pie w-5 text-center"></i>
                    <span>Dashboard</span>
                </button>
                
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider px-4 py-2 mt-4">Manajemen</div>
                
                <button onclick="showPage('settings')" id="nav-settings" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600">
                    <i class="fas fa-sliders-h w-5 text-center"></i>
                    <span>Setting Mesin</span>
                </button>
                
                <button onclick="showPage('repairs')" id="nav-repairs" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600">
                    <i class="fas fa-wrench w-5 text-center"></i>
                    <span>Perbaikan Mesin</span>
                </button>
            </nav>

            <!-- User -->
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center gap-3 px-4 py-3 bg-gray-50 rounded-xl">
                    <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md">
                        OP
                    </div>
                    <div>
                        <p class="text-sm font-semibold">TEKNIK</p>
                        <p class="text-xs text-gray-400">ENGINEERING</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Header -->
            <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 lg:px-8 py-4 sticky top-0 z-30">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg transition-colors">
                            <i class="fas fa-bars text-gray-600"></i>
                        </button>
                        <div class="hidden sm:block text-sm text-gray-500" id="current-date">
                            <!-- Date injected by JS -->
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors relative">
                            <i class="fas fa-bell text-gray-500"></i>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                            <i class="fas fa-search text-gray-500"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="flex-1 overflow-y-auto p-4 lg:p-8" id="main-content">
                <!-- Content injected by JS -->
            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <i class="fas fa-check-circle text-green-400"></i>
            <span id="toast-message">Berhasil!</span>
        </div>
    </div>

    <script>
        // ==================== DATA STORE ====================
        const machineIcons = {
            filling: '🥤',
            crimping: '🔧',
            collaring: '🏷️',
            label: '🏷️',
            coding_hitachi: '🖨️',
            cartoning: '📦',
            check_weigher: '⚖️',
            blister_auto: '💊',
            blister_manual: '💊',
            carton_sealer: '📦'
        };

        let machines = [
            { id: 'm1', name: 'Mesin Filling', type: 'filling', status: 'active', location: 'Line 1' },
            { id: 'm2', name: 'Mesin Crimping', type: 'crimping', status: 'active', location: 'Line 1' },
            { id: 'm3', name: 'Mesin Collar', type: 'collar', status: 'maintenance', location: 'Line 2' },
            { id: 'm4', name: 'Mesin Label', type: 'label', status: 'active', location: 'Line 2' },
            { id: 'm5', name: 'Mesin Coding Hitachi', type: 'coding', status: 'active', location: 'Line 3' },
            { id: 'm6', name: 'Mesin Cartoning', type: 'cartoning', status: 'active', location: 'Line 3' },
            { id: 'm7', name: 'Mesin Check Weigher', type: 'check_weigher', status: 'active', location: 'Line 4' },
            { id: 'm8', name: 'Mesin Blister Auto', type: 'blister_auto', status: 'offline', location: 'Line 4' },
            { id: 'm9', name: 'Mesin Blister Manual', type: 'blister_manual', status: 'active', location: 'Line 5' },
            { id: 'm10', name: 'Mesin Carton Sealer', type: 'carton_sealer', status: 'maintenance', location: 'Line 5' }
        ];

        let settings = {
            m1: [
                { id: 's1', machine_id: 'm1', title: 'Persiapan Bahan Baku', description: 'Pastikan bahan baku telah diperiksa kualitasnya dan tersedia dalam jumlah cukup.', step_order: 1, image: null },
                { id: 's2', machine_id: 'm1', title: 'Kalibrasi Volume', description: 'Atur volume filling sesuai spesifikasi produk. Gunakan gelas ukur untuk verifikasi.', step_order: 2, image: null },
                { id: 's3', machine_id: 'm1', title: 'Pengecekan Seal', description: 'Periksa kondisi seal dan pastikan tidak ada kebocoran.', step_order: 3, image: null }
            ],
            m2: [
                { id: 's4', machine_id: 'm2', title: 'Pengaturan Crimping Head', description: 'Sesuaikan posisi crimping head dengan diameter botol.', step_order: 1, image: null }
            ]
        };

        let repairs = {
            m3: [
                { id: 'r1', machine_id: 'm3', issue: 'Motor conveyor macet', solution: 'Ganti bearing motor dan lakukan pelumasan', technician: 'Budi Santoso', status: 'completed', created_at: '2026-05-10', completed_at: '2026-05-11' },
                { id: 'r2', machine_id: 'm3', issue: 'Sensor collar tidak terdeteksi', solution: null, technician: null, status: 'pending', created_at: '2026-05-15', completed_at: null }
            ]
        };

        let currentPage = 'dashboard';
        let selectedMachine = null;
        let editingSetting = null;

        // ==================== UTILITIES ====================
        function generateId() {
            return 'id_' + Math.random().toString(36).substr(2, 9);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // ==================== RENDER FUNCTIONS ====================
        function showPage(page, machineId = null) {
            currentPage = page;
            selectedMachine = machineId;
            editingSetting = null;

            // Update nav active state
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${page === 'setting-form' ? 'settings' : page}`)?.classList.add('active');

            const content = document.getElementById('main-content');
            content.innerHTML = '';

            switch(page) {
                case 'dashboard':
                    renderDashboard(content);
                    break;
                case 'settings':
                    if (machineId) renderMachineSettings(content, machineId);
                    else renderSettingsList(content);
                    break;
                case 'setting-form':
                    renderSettingForm(content, machineId);
                    break;
                case 'repairs':
                    if (machineId) renderMachineRepairs(content, machineId);
                    else renderRepairsList(content);
                    break;
            }

            // Close mobile sidebar
            if (window.innerWidth < 1024) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
        }

        function renderDashboard(container) {
            const activeCount = machines.filter(m => m.status === 'active').length;
            const maintenanceCount = machines.filter(m => m.status === 'maintenance').length;

            container.innerHTML = `
                <div class="animate-fade-in space-y-6 max-w-7xl mx-auto">
                    <!-- Header -->
                    <div>
                        <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Dashboard Mesin Produksi</h2>
                        <p class="text-gray-500 mt-1">Kelola setting dan perbaikan seluruh mesin produksi</p>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-gray-500">Total Mesin</p>
                                    <p class="text-3xl font-bold text-gray-900 mt-1">${machines.length}</p>
                                </div>
                                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center">
                                    <i class="fas fa-industry text-blue-600 text-xl"></i>
                                </div>
                            </div>
                            <div class="mt-4 flex items-center gap-2 text-sm text-gray-500">
                                <span class="text-green-500 font-medium"><i class="fas fa-arrow-up mr-1"></i>100%</span>
                                <span>terdaftar</span>
                            </div>
                        </div>

                        <div class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-gray-500">Mesin Aktif</p>
                                    <p class="text-3xl font-bold text-green-600 mt-1">${activeCount}</p>
                                </div>
                                <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center">
                                    <i class="fas fa-check-circle text-green-600 text-xl"></i>
                                </div>
                            </div>
                            <div class="mt-4 w-full bg-gray-100 rounded-full h-2">
                                <div class="bg-green-500 h-2 rounded-full" style="width: ${(activeCount/machines.length)*100}%"></div>
                            </div>
                        </div>

                        <div class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm font-medium text-gray-500">Perlu Perawatan</p>
                                    <p class="text-3xl font-bold text-amber-600 mt-1">${maintenanceCount}</p>
                                </div>
                                <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center">
                                    <i class="fas fa-exclamation-triangle text-amber-600 text-xl"></i>
                                </div>
                            </div>
                            <div class="mt-4 flex items-center gap-2 text-sm">
                                <span class="text-amber-600 font-medium">${machines.filter(m => m.status === 'offline').length} offline</span>
                                <span class="text-gray-400">•</span>
                                <span class="text-gray-500">butuh perhatian</span>
                            </div>
                        </div>
                    </div>

                    <!-- Machines Grid -->
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold text-gray-900">Daftar Mesin</h3>
                            <div class="flex gap-2">
                                <button class="px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50">
                                    <i class="fas fa-filter mr-1"></i> Filter
                                </button>
                                <button class="px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50">
                                    <i class="fas fa-sort mr-1"></i> Urutkan
                                </button>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                            ${machines.map((machine, idx) => {
                                const statusColors = {
                                    active: 'bg-green-100 text-green-700 border-green-200',
                                    maintenance: 'bg-amber-100 text-amber-700 border-amber-200',
                                    offline: 'bg-red-100 text-red-700 border-red-200'
                                };
                                const statusLabels = { active: 'Aktif', maintenance: 'Perawatan', offline: 'Offline' };
                                const statusIcons = { active: 'fa-check-circle', maintenance: 'fa-wrench', offline: 'fa-times-circle' };
                                
                                return `
                                <div class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm animate-slide-up" style="animation-delay: ${idx * 0.05}s">
                                    <div class="flex items-start justify-between mb-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-14 h-14 bg-gradient-to-br from-gray-50 to-gray-100 rounded-2xl flex items-center justify-center machine-icon">
                                                ${machineIcons[machine.type] || '⚙️'}
                                            </div>
                                            <div>
                                                <h4 class="font-bold text-gray-900">${machine.name}</h4>
                                                <p class="text-sm text-gray-500 flex items-center gap-1">
                                                    <i class="fas fa-map-marker-alt text-xs"></i> ${machine.location}
                                                </p>
                                            </div>
                                        </div>
                                        <span class="status-badge ${statusColors[machine.status]} border">
                                            <i class="fas ${statusIcons[machine.status]} text-xs"></i>
                                            ${statusLabels[machine.status]}
                                        </span>
                                    </div>

                                    <div class="grid grid-cols-2 gap-2 mt-4">
                                        <button onclick="showPage('settings', '${machine.id}')" 
                                            class="flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-50 text-blue-700 rounded-xl hover:bg-blue-100 transition-colors text-sm font-semibold">
                                            <i class="fas fa-sliders-h"></i>
                                            Setting
                                        </button>
                                        <button onclick="showPage('repairs', '${machine.id}')"
                                            class="flex items-center justify-center gap-2 px-4 py-2.5 bg-gray-50 text-gray-700 rounded-xl hover:bg-gray-100 transition-colors text-sm font-semibold">
                                            <i class="fas fa-wrench"></i>
                                            Perbaikan
                                        </button>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSettingsList(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-6 max-w-7xl mx-auto">
                    <div class="flex items-center gap-4">
                        <button onclick="showPage('dashboard')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                            <i class="fas fa-arrow-left text-gray-600"></i>
                        </button>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">Pilih Mesin untuk Setting</h2>
                            <p class="text-gray-500">Pilih mesin yang akan dikonfigurasi</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                        ${machines.map(machine => `
                            <button onclick="showPage('settings', '${machine.id}')" 
                                class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm text-left w-full">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-2xl">
                                        ${machineIcons[machine.type] || '⚙️'}
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-900">${machine.name}</h4>
                                        <p class="text-sm text-gray-500">${machine.location}</p>
                                    </div>
                                    <i class="fas fa-chevron-right text-gray-400"></i>
                                </div>
                                <div class="mt-3 flex items-center gap-2 text-sm text-gray-500">
                                    <i class="fas fa-list-ol text-blue-500"></i>
                                    <span>${(settings[machine.id] || []).length} langkah setting</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderMachineSettings(container, machineId) {
            const machine = machines.find(m => m.id === machineId);
            const machineSettings = settings[machineId] || [];

            container.innerHTML = `
                <div class="animate-fade-in space-y-6 max-w-4xl mx-auto">
                    <!-- Header -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="showPage('settings')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                                <i class="fas fa-arrow-left text-gray-600"></i>
                            </button>
                            <div>
                                <h2 class="text-2xl font-bold text-gray-900">${machine.name}</h2>
                                <p class="text-gray-500">Setting & Konfigurasi Mesin</p>
                            </div>
                        </div>
                        <button onclick="showPage('setting-form', '${machineId}')" 
                            class="btn-primary px-5 py-2.5 rounded-xl text-white font-semibold flex items-center gap-2 shadow-lg shadow-blue-500/30">
                            <i class="fas fa-plus"></i>
                            Tambah Langkah
                        </button>
                    </div>

                    <!-- Settings List -->
                    <div class="space-y-4">
                        ${machineSettings.length === 0 ? `
                            <div class="bg-white rounded-2xl p-12 text-center border border-gray-100 shadow-sm">
                                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-sliders-h text-gray-300 text-3xl"></i>
                                </div>
                                <h3 class="text-lg font-bold text-gray-900">Belum ada langkah setting</h3>
                                <p class="text-gray-500 mt-1 mb-6">Tambahkan langkah-langkah konfigurasi mesin</p>
                                <button onclick="showPage('setting-form', '${machineId}')" 
                                    class="btn-primary px-6 py-3 rounded-xl text-white font-semibold">
                                    <i class="fas fa-plus mr-2"></i>
                                    Tambah Langkah Pertama
                                </button>
                            </div>
                        ` : machineSettings.sort((a,b) => a.step_order - b.step_order).map((setting, idx) => `
                            <div class="step-card bg-white rounded-2xl p-6 border border-gray-100 shadow-sm card-hover animate-slide-up" style="animation-delay: ${idx * 0.05}s">
                                <div class="flex items-start gap-5">
                                    <div class="flex-shrink-0">
                                        <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30">
                                            ${setting.step_order}
                                        </div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-start justify-between gap-4">
                                            <div>
                                                <h4 class="text-lg font-bold text-gray-900">${setting.title}</h4>
                                                ${setting.description ? `<p class="text-gray-600 mt-2 leading-relaxed">${setting.description}</p>` : ''}
                                            </div>
                                            <div class="flex items-center gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onclick="editSetting('${machineId}', '${setting.id}')" 
                                                    class="p-2 hover:bg-blue-50 text-blue-600 rounded-lg transition-colors" title="Edit">
                                                    <i class="fas fa-pencil-alt"></i>
                                                </button>
                                                <button onclick="deleteSetting('${machineId}', '${setting.id}')" 
                                                    class="p-2 hover:bg-red-50 text-red-600 rounded-lg transition-colors" title="Hapus">
                                                    <i class="fas fa-trash-alt"></i>
                                                </button>
                                            </div>
                                        </div>
                                        
                                        ${setting.image ? `
                                            <div class="mt-4 rounded-xl overflow-hidden border border-gray-200 max-w-md">
                                                <img src="${setting.image}" alt="${setting.title}" class="w-full h-48 object-cover">
                                            </div>
                                        ` : ''}
                                        
                                        <div class="mt-3 flex items-center gap-4 text-xs text-gray-400">
                                            <span><i class="far fa-clock mr-1"></i> ${formatDate(setting.created_at || new Date().toISOString())}</span>
                                            <span class="text-gray-300">•</span>
                                            <span class="text-blue-500 font-medium">Langkah ${setting.step_order}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderSettingForm(container, machineId) {
            const machine = machines.find(m => m.id === machineId);
            const isEditing = !!editingSetting;
            const setting = isEditing ? editingSetting : null;
            
            const machineSettings = settings[machineId] || [];
            const nextOrder = machineSettings.reduce((max, s) => Math.max(max, s.step_order), 0) + 1;

            container.innerHTML = `
                <div class="animate-scale-in max-w-2xl mx-auto space-y-6">
                    <div class="flex items-center gap-4">
                        <button onclick="showPage('settings', '${machineId}')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                            <i class="fas fa-arrow-left text-gray-600"></i>
                        </button>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">${isEditing ? 'Edit Langkah' : 'Tambah Langkah Baru'}</h2>
                            <p class="text-gray-500">${machine.name}</p>
                        </div>
                    </div>

                    <form onsubmit="saveSetting(event, '${machineId}')" class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Nomor Urut Langkah</label>
                            <input type="number" name="step_order" value="${isEditing ? setting.step_order : nextOrder}" min="1"
                                class="w-20 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all font-semibold" required>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Judul Langkah <span class="text-red-500">*</span></label>
                            <input type="text" name="title" value="${isEditing ? setting.title : ''}" placeholder="Contoh: Persiapan Bahan Baku"
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" required>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Deskripsi / Penjelasan</label>
                            <textarea name="description" rows="4" placeholder="Jelaskan langkah-langkah detail..."
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none">${isEditing ? (setting.description || '') : ''}</textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Foto / Gambar Panduan</label>
                            <div id="image-preview-container" class="${isEditing && setting.image ? '' : 'hidden'} mb-3">
                                <div class="relative rounded-xl overflow-hidden border border-gray-200 max-w-md">
                                    <img id="image-preview" src="${isEditing && setting.image ? setting.image : ''}" class="w-full h-48 object-cover">
                                    <button type="button" onclick="clearImage()" class="absolute top-2 right-2 p-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors shadow-lg">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            <div id="upload-zone" onclick="document.getElementById('image-input').click()" 
                                class="image-upload-zone rounded-xl p-8 text-center ${isEditing && setting.image ? 'hidden' : ''}">
                                <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i class="fas fa-cloud-upload-alt text-gray-400 text-2xl"></i>
                                </div>
                                <p class="text-sm font-semibold text-gray-700">Klik untuk upload gambar</p>
                                <p class="text-xs text-gray-400 mt-1">PNG, JPG, WEBP (Max 5MB)</p>
                            </div>
                            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(this)">
                        </div>

                        <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
                            <button type="button" onclick="showPage('settings', '${machineId}')" 
                                class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-semibold">
                                Batal
                            </button>
                            <button type="submit" 
                                class="btn-primary px-6 py-2.5 rounded-xl text-white font-semibold flex items-center gap-2">
                                <i class="fas fa-save"></i>
                                ${isEditing ? 'Simpan Perubahan' : 'Tambah Langkah'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
        }

        function renderRepairsList(container) {
            container.innerHTML = `
                <div class="animate-fade-in space-y-6 max-w-7xl mx-auto">
                    <div class="flex items-center gap-4">
                        <button onclick="showPage('dashboard')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                            <i class="fas fa-arrow-left text-gray-600"></i>
                        </button>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">Pilih Mesin untuk Perbaikan</h2>
                            <p class="text-gray-500">Lihat dan catat riwayat perbaikan mesin</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                        ${machines.map(machine => {
                            const machineRepairs = repairs[machine.id] || [];
                            const pendingCount = machineRepairs.filter(r => r.status === 'pending').length;
                            
                            return `
                            <button onclick="showPage('repairs', '${machine.id}')" 
                                class="card-hover bg-white rounded-2xl p-6 border border-gray-100 shadow-sm text-left w-full relative">
                                ${pendingCount > 0 ? `<span class="absolute top-4 right-4 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs font-bold">${pendingCount}</span>` : ''}
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-2xl">
                                        ${machineIcons[machine.type] || '⚙️'}
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-bold text-gray-900">${machine.name}</h4>
                                        <p class="text-sm text-gray-500">${machine.location}</p>
                                    </div>
                                    <i class="fas fa-chevron-right text-gray-400"></i>
                                </div>
                                <div class="mt-3 flex items-center gap-4 text-sm">
                                    <span class="text-gray-500">
                                        <i class="fas fa-history mr-1"></i> ${machineRepairs.length} riwayat
                                    </span>
                                    ${pendingCount > 0 ? `<span class="text-red-500 font-medium"><i class="fas fa-exclamation-circle mr-1"></i> ${pendingCount} pending</span>` : ''}
                                </div>
                            </button>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderMachineRepairs(container, machineId) {
            const machine = machines.find(m => m.id === machineId);
            const machineRepairs = repairs[machineId] || [];

            container.innerHTML = `
                <div class="animate-fade-in space-y-6 max-w-4xl mx-auto">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="showPage('repairs')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                                <i class="fas fa-arrow-left text-gray-600"></i>
                            </button>
                            <div>
                                <h2 class="text-2xl font-bold text-gray-900">${machine.name}</h2>
                                <p class="text-gray-500">Riwayat Perbaikan & Maintenance</p>
                            </div>
                        </div>
                        <button onclick="toggleRepairForm()" 
                            class="btn-primary px-5 py-2.5 rounded-xl text-white font-semibold flex items-center gap-2 shadow-lg shadow-blue-500/30">
                            <i class="fas fa-plus"></i>
                            Catat Perbaikan
                        </button>
                    </div>

                    <!-- Add Form (hidden by default) -->
                    <div id="repair-form" class="hidden bg-white rounded-2xl p-6 border border-gray-100 shadow-sm space-y-4 animate-scale-in">
                        <h3 class="font-bold text-gray-900 text-lg">Catat Perbaikan Baru</h3>
                        <form onsubmit="saveRepair(event, '${machineId}')">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Masalah / Kerusakan <span class="text-red-500">*</span></label>
                                <textarea name="issue" rows="3" placeholder="Deskripsikan masalah yang terjadi..."
                                    class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none" required></textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Solusi / Tindakan</label>
                                    <input type="text" name="solution" placeholder="Bagaimana masalah diselesaikan..."
                                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Teknisi</label>
                                    <input type="text" name="technician" placeholder="Nama teknisi yang menangani"
                                        class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                                </div>
                            </div>
                            <div class="flex justify-end gap-3 pt-2">
                                <button type="button" onclick="toggleRepairForm()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-semibold">Batal</button>
                                <button type="submit" class="btn-primary px-6 py-2.5 rounded-xl text-white font-semibold flex items-center gap-2">
                                    <i class="fas fa-check-circle"></i> Simpan
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Repairs List -->
                    <div class="space-y-4">
                        ${machineRepairs.length === 0 ? `
                            <div class="bg-white rounded-2xl p-12 text-center border border-gray-100 shadow-sm">
                                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-wrench text-gray-300 text-3xl"></i>
                                </div>
                                <h3 class="text-lg font-bold text-gray-900">Belum ada riwayat perbaikan</h3>
                                <p class="text-gray-500 mt-1">Catat perbaikan pertama untuk mesin ini</p>
                            </div>
                        ` : machineRepairs.map((repair, idx) => `
                            <div class="${repair.status === 'completed' ? 'repair-card-done' : 'repair-card-pending'} bg-white rounded-2xl p-6 border border-gray-100 shadow-sm animate-slide-up" style="animation-delay: ${idx * 0.05}s">
                                <div class="flex items-start justify-between gap-4">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-3 mb-3">
                                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${repair.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                                                <i class="fas ${repair.status === 'completed' ? 'fa-check-circle' : 'fa-clock'}"></i>
                                                ${repair.status === 'completed' ? 'Selesai' : 'Dalam Proses'}
                                            </span>
                                            <span class="text-xs text-gray-400 flex items-center gap-1">
                                                <i class="far fa-calendar"></i> ${formatDate(repair.created_at)}
                                            </span>
                                            ${repair.completed_at ? `<span class="text-xs text-gray-400 flex items-center gap-1"><i class="far fa-calendar-check"></i> Selesai: ${formatDate(repair.completed_at)}</span>` : ''}
                                        </div>
                                        
                                        <h4 class="font-bold text-gray-900 mb-2 text-lg">${repair.issue}</h4>
                                        
                                        ${repair.solution ? `
                                            <div class="bg-gray-50 rounded-lg p-3 mb-3">
                                                <p class="text-sm text-gray-600"><span class="font-semibold text-gray-700">Solusi:</span> ${repair.solution}</p>
                                            </div>
                                        ` : ''}
                                        
                                        ${repair.technician ? `
                                            <div class="flex items-center gap-2 text-sm text-gray-500">
                                                <div class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center">
                                                    <i class="fas fa-user text-blue-500 text-xs"></i>
                                                </div>
                                                <span class="font-medium">${repair.technician}</span>
                                            </div>
                                        ` : ''}
                                    </div>
                                    
                                    ${repair.status === 'pending' ? `
                                        <button onclick="completeRepair('${machineId}', '${repair.id}')" 
                                            class="flex-shrink-0 px-4 py-2 bg-green-500 text-white rounded-xl hover:bg-green-600 transition-colors text-sm font-semibold flex items-center gap-2 shadow-lg shadow-green-500/30">
                                            <i class="fas fa-check"></i>
                                            Selesai
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ==================== ACTIONS ====================
        let selectedImage = null;

        function handleImageSelect(input) {
            const file = input.files[0];
            if (!file) return;
            
            selectedImage = file;
            const reader = new FileReader();
            reader.onloadend = () => {
                const preview = document.getElementById('image-preview');
                const container = document.getElementById('image-preview-container');
                const zone = document.getElementById('upload-zone');
                
                preview.src = reader.result;
                container.classList.remove('hidden');
                zone.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            selectedImage = null;
            document.getElementById('image-input').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('upload-zone').classList.remove('hidden');
        }

        function saveSetting(event, machineId) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            const newSetting = {
                id: editingSetting ? editingSetting.id : generateId(),
                machine_id: machineId,
                title: formData.get('title'),
                description: formData.get('description') || null,
                step_order: parseInt(formData.get('step_order')),
                image: selectedImage ? URL.createObjectURL(selectedImage) : (editingSetting ? editingSetting.image : null),
                created_at: editingSetting ? editingSetting.created_at : new Date().toISOString()
            };

            if (!settings[machineId]) settings[machineId] = [];
            
            if (editingSetting) {
                const idx = settings[machineId].findIndex(s => s.id === editingSetting.id);
                if (idx !== -1) settings[machineId][idx] = newSetting;
                showToast('Langkah berhasil diperbarui!');
            } else {
                settings[machineId].push(newSetting);
                showToast('Langkah baru berhasil ditambahkan!');
            }

            selectedImage = null;
            showPage('settings', machineId);
        }

        function editSetting(machineId, settingId) {
            const setting = settings[machineId]?.find(s => s.id === settingId);
            if (!setting) return;
            
            editingSetting = setting;
            showPage('setting-form', machineId);
        }

        function deleteSetting(machineId, settingId) {
            if (!confirm('Apakah Anda yakin ingin menghapus langkah ini?')) return;
            
            settings[machineId] = settings[machineId].filter(s => s.id !== settingId);
            showToast('Langkah berhasil dihapus!');
            renderMachineSettings(document.getElementById('main-content'), machineId);
        }

        function toggleRepairForm() {
            const form = document.getElementById('repair-form');
            form.classList.toggle('hidden');
            if (!form.classList.contains('hidden')) {
                form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function saveRepair(event, machineId) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            const newRepair = {
                id: generateId(),
                machine_id: machineId,
                issue: formData.get('issue'),
                solution: formData.get('solution') || null,
                technician: formData.get('technician') || null,
                status: 'pending',
                created_at: new Date().toISOString().split('T')[0],
                completed_at: null
            };

            if (!repairs[machineId]) repairs[machineId] = [];
            repairs[machineId].unshift(newRepair);
            
            showToast('Perbaikan berhasil dicatat!');
            renderMachineRepairs(document.getElementById('main-content'), machineId);
        }

        function completeRepair(machineId, repairId) {
            const repair = repairs[machineId]?.find(r => r.id === repairId);
            if (!repair) return;
            
            repair.status = 'completed';
            repair.completed_at = new Date().toISOString().split('T')[0];
            
            showToast('Perbaikan ditandai selesai!');
            renderMachineRepairs(document.getElementById('main-content'), machineId);
        }

        // ==================== INIT ====================
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        // Initial render
        showPage('dashboard');
    </script>
</body>
</html>
